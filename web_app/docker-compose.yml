services:

  backend:
    build: ./backend
    container_name: rag-f1-backend
    ports:
      - "8000:8000"
    restart: always
    env_file:
      - ../.env
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: rag-f1-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ../data/qdrant_storage:/qdrant/storage